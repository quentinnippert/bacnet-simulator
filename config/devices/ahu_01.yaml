device_id: 1001
name: "AHU-01"
description: "Air Handling Unit - Main Building"
points:
  - object_type: analogInput
    object_instance: 1
    object_name: "AHU-01/SupplyAirTemp"
    description: "Supply air temperature"
    present_value: 22.5
    units: "degreesCelsius"
    cov_increment: 0.5
  - object_type: analogInput
    object_instance: 2
    object_name: "AHU-01/ReturnAirTemp"
    description: "Return air temperature"
    present_value: 24.0
    units: "degreesCelsius"
    cov_increment: 0.5
  - object_type: analogInput
    object_instance: 3
    object_name: "AHU-01/MixedAirTemp"
    description: "Mixed air temperature"
    present_value: 20.0
    units: "degreesCelsius"
    cov_increment: 0.5
  - object_type: analogOutput
    object_instance: 1
    object_name: "AHU-01/CoolingValve"
    description: "Cooling coil valve position"
    present_value: 45.0
    units: "percent"
    cov_increment: 1.0
  - object_type: analogOutput
    object_instance: 2
    object_name: "AHU-01/HeatingValve"
    description: "Heating coil valve position"
    present_value: 0.0
    units: "percent"
    cov_increment: 1.0
  - object_type: analogOutput
    object_instance: 3
    object_name: "AHU-01/FanSpeed"
    description: "Supply fan speed"
    present_value: 75.0
    units: "percent"
    cov_increment: 1.0
  - object_type: analogValue
    object_instance: 1
    object_name: "AHU-01/SupplyAirTempSetpoint"
    description: "Supply air temperature setpoint"
    present_value: 22.0
    units: "degreesCelsius"
    cov_increment: 0.5
  - object_type: binaryInput
    object_instance: 1
    object_name: "AHU-01/FilterDirty"
    description: "Filter dirty alarm"
    present_value: false
  - object_type: binaryOutput
    object_instance: 1
    object_name: "AHU-01/SupplyFanEnable"
    description: "Supply fan enable command"
    present_value: true
  - object_type: binaryOutput
    object_instance: 2
    object_name: "AHU-01/ReturnFanEnable"
    description: "Return fan enable command"
    present_value: true
  - object_type: analogInput
    object_instance: 4
    object_name: "AHU-01/DuctStaticPressure"
    description: "Duct static pressure"
    present_value: 250.0
    units: "pascals"
    cov_increment: 5.0
  - object_type: analogValue
    object_instance: 2
    object_name: "AHU-01/DuctPressureSetpoint"
    description: "Duct pressure setpoint"
    present_value: 250.0
    units: "pascals"
    cov_increment: 5.0
