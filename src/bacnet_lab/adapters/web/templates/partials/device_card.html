{% for device in devices %}
<article>
    <header>
        <span>{{ device.name }}</span>
        <span class="status-badge status-{{ device.status.value }}">{{ device.status.value }}</span>
    </header>
    <p>{{ device.description }}</p>
    <small>ID: {{ device.device_id }} — {{ device.points|length }} points</small>
    <footer>
        <a href="/ui/devices/{{ device.device_id }}" role="button" class="outline secondary">Details</a>
    </footer>
</article>
{% endfor %}
